<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Daily Planner</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #f8f6f3;
            --card-bg: #ffffff;
            --text: #1a1a1a;
            --text-muted: #6b6b6b;
            --primary: #6366f1;
            --primary-light: #818cf8;
            --primary-dark: #4f46e5;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --border: #e5e5e5;
            --shadow: rgba(0, 0, 0, 0.1);
            --timer-ring: #6366f1;
        }

        body {
            font-family: 'Lexend', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            overflow-x: hidden;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding: 1.5rem;
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 2px 12px var(--shadow);
        }

        .header-left h1 {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 0.25rem;
        }

        .date-display {
            font-size: 0.95rem;
            color: var(--text-muted);
            font-weight: 400;
        }

        .header-actions {
            display: flex;
            gap: 0.75rem;
        }

        .btn {
            padding: 0.65rem 1.25rem;
            border: none;
            background: var(--primary);
            color: white;
            border-radius: 12px;
            font-family: 'Lexend', sans-serif;
            font-weight: 500;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        .btn-secondary {
            background: transparent;
            color: var(--primary);
            border: 2px solid var(--primary);
        }

        .btn-secondary:hover {
            background: var(--primary);
            color: white;
        }

        /* Main Layout */
        .main-layout {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 2rem;
        }

        /* Sidebar - Task Library */
        .sidebar {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 1.5rem;
            box-shadow: 0 2px 12px var(--shadow);
            height: fit-content;
            position: sticky;
            top: 2rem;
        }

        .sidebar-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            color: var(--text);
        }

        .add-task-btn {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 1.5rem;
            transition: all 0.2s ease;
        }

        .add-task-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.4);
        }

        .task-templates {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
        }

        .task-template {
            padding: 0.75rem;
            background: var(--bg);
            border: 2px solid var(--border);
            border-radius: 12px;
            cursor: move;
            transition: all 0.2s ease;
            text-align: center;
        }

        .task-template:hover {
            border-color: var(--primary);
            transform: scale(1.05);
            box-shadow: 0 4px 12px var(--shadow);
        }

        .task-template.dragging {
            opacity: 0.5;
        }

        .task-icon {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .task-name {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text);
        }

        /* Timeline */
        .timeline-container {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 2px 12px var(--shadow);
            min-height: 600px;
        }

        .timeline-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .timeline-title {
            font-size: 1.4rem;
            font-weight: 600;
        }

        .timeline {
            position: relative;
            padding-left: 80px;
        }

        .timeline-hours {
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 60px;
        }

        .hour-label {
            height: 60px;
            display: flex;
            align-items: center;
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        .timeline-track {
            position: relative;
            background: var(--bg);
            border-radius: 12px;
            min-height: 1440px; /* 24 hours * 60px */
            padding: 0.5rem;
        }

        .current-time-indicator {
            position: absolute;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--danger);
            z-index: 10;
            transition: top 1s linear;
        }

        .current-time-indicator::before {
            content: '';
            position: absolute;
            left: 0;
            top: -4px;
            width: 10px;
            height: 10px;
            background: var(--danger);
            border-radius: 50%;
        }

        /* Scheduled Task */
        .scheduled-task {
            position: absolute;
            left: 0.5rem;
            right: 0.5rem;
            background: white;
            border-radius: 12px;
            padding: 1rem;
            box-shadow: 0 2px 12px var(--shadow);
            cursor: pointer;
            transition: all 0.2s ease;
            border-left: 4px solid var(--primary);
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .scheduled-task:hover {
            transform: translateX(4px);
            box-shadow: 0 4px 16px var(--shadow);
        }

        .scheduled-task.active {
            border-left-color: var(--success);
            background: linear-gradient(90deg, #10b98115 0%, white 30%);
        }

        .task-icon-scheduled {
            font-size: 2rem;
            flex-shrink: 0;
        }

        .task-content {
            flex: 1;
        }

        .task-title {
            font-weight: 600;
            margin-bottom: 0.25rem;
            color: var(--text);
        }

        .task-duration {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .task-actions {
            display: flex;
            gap: 0.5rem;
        }

        .task-action-btn {
            width: 32px;
            height: 32px;
            border: none;
            background: var(--bg);
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .task-action-btn:hover {
            background: var(--primary);
            color: white;
        }

        /* Focus Timer Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 3rem;
            max-width: 500px;
            width: 90%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: modalIn 0.3s ease;
        }

        @keyframes modalIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .timer-display {
            position: relative;
            width: 250px;
            height: 250px;
            margin: 2rem auto;
        }

        .timer-circle {
            width: 100%;
            height: 100%;
        }

        .timer-ring {
            fill: none;
            stroke: var(--border);
            stroke-width: 12;
        }

        .timer-progress {
            fill: none;
            stroke: var(--timer-ring);
            stroke-width: 12;
            stroke-linecap: round;
            transform: rotate(-90deg);
            transform-origin: center;
            transition: stroke-dashoffset 1s linear;
        }

        .timer-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .timer-time {
            font-size: 3.5rem;
            font-weight: 700;
            color: var(--primary);
            line-height: 1;
        }

        .timer-label {
            font-size: 1rem;
            color: var(--text-muted);
            margin-top: 0.5rem;
        }

        .timer-controls {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-top: 2rem;
        }

        .timer-btn {
            padding: 0.75rem 2rem;
            border: none;
            border-radius: 12px;
            font-family: 'Lexend', sans-serif;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .timer-btn-start {
            background: var(--primary);
            color: white;
        }

        .timer-btn-start:hover {
            background: var(--primary-dark);
        }

        .timer-btn-close {
            background: var(--bg);
            color: var(--text);
        }

        /* Task Editor Modal */
        .editor-form {
            text-align: left;
            margin-top: 2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--text);
        }

        .form-input {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid var(--border);
            border-radius: 10px;
            font-family: 'Lexend', sans-serif;
            font-size: 0.95rem;
            transition: border-color 0.2s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .icon-picker {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 0.75rem;
            margin-top: 0.75rem;
        }

        .icon-option {
            padding: 0.75rem;
            background: var(--bg);
            border: 2px solid var(--border);
            border-radius: 10px;
            font-size: 1.8rem;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s ease;
        }

        .icon-option:hover,
        .icon-option.selected {
            border-color: var(--primary);
            background: white;
            transform: scale(1.1);
        }

        .color-picker {
            display: flex;
            gap: 0.75rem;
            margin-top: 0.75rem;
        }

        .color-option {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            cursor: pointer;
            border: 3px solid transparent;
            transition: all 0.2s ease;
        }

        .color-option:hover,
        .color-option.selected {
            transform: scale(1.15);
            border-color: var(--text);
        }

        .image-upload {
            margin-top: 0.75rem;
        }

        .upload-area {
            padding: 2rem;
            border: 2px dashed var(--border);
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .upload-area:hover {
            border-color: var(--primary);
            background: var(--bg);
        }

        .upload-area.has-image {
            padding: 0;
            border: 2px solid var(--primary);
        }

        .preview-image {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 10px;
        }

        /* Empty State */
        .empty-timeline {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-muted);
        }

        .empty-timeline-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            opacity: 0.3;
        }

        /* Responsive */
        @media (max-width: 968px) {
            .main-layout {
                grid-template-columns: 1fr;
            }

            .sidebar {
                position: static;
            }

            .container {
                padding: 1rem;
            }
        }

        /* Animations */
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .scheduled-task {
            animation: slideIn 0.3s ease;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="header-left">
                <h1>Visual Daily Planner</h1>
                <div class="date-display" id="dateDisplay"></div>
            </div>
            <div class="header-actions">
                <button class="btn btn-secondary" onclick="exportDay()">💾 Export</button>
                <button class="btn" onclick="showSettings()">⚙️ Settings</button>
            </div>
        </div>

        <div class="main-layout">
            <!-- Sidebar - Task Library -->
            <div class="sidebar">
                <h2 class="sidebar-title">Task Library</h2>
                <button class="add-task-btn" onclick="createCustomTask()">+ Create Custom Task</button>
                
                <div class="task-templates" id="taskTemplates">
                    <!-- Task templates will be generated here -->
                </div>
            </div>

            <!-- Timeline -->
            <div class="timeline-container">
                <div class="timeline-header">
                    <h2 class="timeline-title">Today's Schedule</h2>
                    <button class="btn btn-secondary" onclick="clearDay()">Clear Day</button>
                </div>

                <div class="timeline">
                    <div class="timeline-hours" id="timelineHours">
                        <!-- Hour labels will be generated here -->
                    </div>
                    <div class="timeline-track" id="timelineTrack" ondrop="drop(event)" ondragover="allowDrop(event)">
                        <div class="current-time-indicator" id="currentTimeIndicator"></div>
                        <!-- Scheduled tasks will appear here -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Focus Timer Modal -->
    <div class="modal" id="timerModal">
        <div class="modal-content">
            <h2 id="timerTaskName">Task Name</h2>
            <div class="timer-display">
                <svg class="timer-circle" viewBox="0 0 100 100">
                    <circle class="timer-ring" cx="50" cy="50" r="42"></circle>
                    <circle class="timer-progress" cx="50" cy="50" r="42" id="timerProgress"></circle>
                </svg>
                <div class="timer-text">
                    <div class="timer-time" id="timerTime">25:00</div>
                    <div class="timer-label" id="timerLabel">Focus</div>
                </div>
            </div>
            <div class="timer-controls">
                <button class="timer-btn timer-btn-start" onclick="toggleTimer()" id="timerToggle">Start</button>
                <button class="timer-btn timer-btn-close" onclick="closeTimer()">Close</button>
            </div>
        </div>
    </div>

    <!-- Task Editor Modal -->
    <div class="modal" id="editorModal">
        <div class="modal-content">
            <h2>Create Custom Task</h2>
            <form class="editor-form" onsubmit="saveCustomTask(event)">
                <div class="form-group">
                    <label class="form-label">Task Name</label>
                    <input type="text" class="form-input" id="customTaskName" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Duration (minutes)</label>
                    <input type="number" class="form-input" id="customTaskDuration" value="30" min="5" max="480" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Choose Icon</label>
                    <div class="icon-picker" id="iconPicker">
                        <!-- Icons will be generated here -->
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Or Upload Custom Image</label>
                    <div class="image-upload">
                        <div class="upload-area" id="uploadArea" onclick="document.getElementById('imageInput').click()">
                            <p>📷 Click to upload image</p>
                            <img class="preview-image" id="previewImage" style="display: none;">
                        </div>
                        <input type="file" id="imageInput" accept="image/*" style="display: none;" onchange="handleImageUpload(event)">
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Task Color</label>
                    <div class="color-picker" id="colorPicker">
                        <!-- Colors will be generated here -->
                    </div>
                </div>

                <div class="timer-controls">
                    <button type="submit" class="timer-btn timer-btn-start">Save Task</button>
                    <button type="button" class="timer-btn timer-btn-close" onclick="closeEditor()">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Default task templates
        const defaultTasks = [
            { name: 'Morning Routine', icon: '☀️', duration: 30, color: '#fbbf24' },
            { name: 'Breakfast', icon: '🍳', duration: 20, color: '#fb923c' },
            { name: 'Work Focus', icon: '💼', duration: 90, color: '#6366f1' },
            { name: 'Exercise', icon: '🏃', duration: 45, color: '#10b981' },
            { name: 'Lunch', icon: '🍽️', duration: 30, color: '#f59e0b' },
            { name: 'Reading', icon: '📚', duration: 30, color: '#8b5cf6' },
            { name: 'Meditation', icon: '🧘', duration: 15, color: '#06b6d4' },
            { name: 'Shower', icon: '🚿', duration: 15, color: '#3b82f6' },
            { name: 'Sleep', icon: '😴', duration: 480, color: '#6366f1' },
            { name: 'Meeting', icon: '👥', duration: 60, color: '#ec4899' },
            { name: 'Coffee Break', icon: '☕', duration: 15, color: '#92400e' },
            { name: 'Creative Work', icon: '🎨', duration: 60, color: '#a855f7' },
        ];

        const availableIcons = ['☀️', '🍳', '💼', '🏃', '🍽️', '📚', '🧘', '🚿', '😴', '👥', '☕', '🎨', '🎮', '📱', '✏️', '🎵', '🌱', '💡'];
        const availableColors = ['#6366f1', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#ec4899', '#06b6d4', '#3b82f6'];

        let customTasks = JSON.parse(localStorage.getItem('customTasks')) || [];
        let scheduledTasks = JSON.parse(localStorage.getItem('scheduledTasks')) || [];
        let timerState = { isRunning: false, minutes: 0, seconds: 0, interval: null };
        let currentTaskForTimer = null;
        let customTaskData = { icon: '📌', color: '#6366f1', image: null };

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            updateDateDisplay();
            renderTaskTemplates();
            renderTimelineHours();
            renderScheduledTasks();
            updateCurrentTimeIndicator();
            setInterval(updateCurrentTimeIndicator, 60000); // Update every minute
        });

        function updateDateDisplay() {
            const now = new Date();
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('dateDisplay').textContent = now.toLocaleDateString('en-US', options);
        }

        function renderTaskTemplates() {
            const container = document.getElementById('taskTemplates');
            const allTasks = [...defaultTasks, ...customTasks];
            
            container.innerHTML = allTasks.map((task, index) => `
                <div class="task-template" draggable="true" ondragstart="drag(event)" data-task-index="${index}">
                    <div class="task-icon">${task.image ? `<img src="${task.image}" style="width: 40px; height: 40px; object-fit: cover; border-radius: 8px;">` : task.icon}</div>
                    <div class="task-name">${task.name}</div>
                </div>
            `).join('');
        }

        function renderTimelineHours() {
            const container = document.getElementById('timelineHours');
            container.innerHTML = Array.from({ length: 24 }, (_, i) => `
                <div class="hour-label">${String(i).padStart(2, '0')}:00</div>
            `).join('');
        }

        function renderScheduledTasks() {
            const track = document.getElementById('timelineTrack');
            const existingTasks = track.querySelectorAll('.scheduled-task');
            existingTasks.forEach(t => t.remove());

            scheduledTasks.forEach((task, index) => {
                const taskEl = document.createElement('div');
                taskEl.className = 'scheduled-task';
                taskEl.style.top = `${task.startMinute}px`;
                taskEl.style.height = `${task.duration}px`;
                taskEl.style.borderLeftColor = task.color;
                
                const now = new Date();
                const currentMinute = now.getHours() * 60 + now.getMinutes();
                if (currentMinute >= task.startMinute && currentMinute < task.startMinute + task.duration) {
                    taskEl.classList.add('active');
                }

                taskEl.innerHTML = `
                    <div class="task-icon-scheduled">${task.image ? `<img src="${task.image}" style="width: 40px; height: 40px; object-fit: cover; border-radius: 8px;">` : task.icon}</div>
                    <div class="task-content">
                        <div class="task-title">${task.name}</div>
                        <div class="task-duration">${formatTime(task.startMinute)} - ${formatTime(task.startMinute + task.duration)} (${task.duration}min)</div>
                    </div>
                    <div class="task-actions">
                        <button class="task-action-btn" onclick="startTaskTimer(${index})">▶️</button>
                        <button class="task-action-btn" onclick="deleteScheduledTask(${index})">🗑️</button>
                    </div>
                `;

                track.appendChild(taskEl);
            });
        }

        function formatTime(minutes) {
            const hours = Math.floor(minutes / 60);
            const mins = minutes % 60;
            return `${String(hours).padStart(2, '0')}:${String(mins).padStart(2, '0')}`;
        }

        function updateCurrentTimeIndicator() {
            const now = new Date();
            const currentMinute = now.getHours() * 60 + now.getMinutes();
            document.getElementById('currentTimeIndicator').style.top = `${currentMinute}px`;
        }

        // Drag and Drop
        function drag(event) {
            event.dataTransfer.setData('taskIndex', event.target.dataset.taskIndex);
            event.target.classList.add('dragging');
        }

        function allowDrop(event) {
            event.preventDefault();
        }

        function drop(event) {
            event.preventDefault();
            const taskIndex = event.dataTransfer.getData('taskIndex');
            const allTasks = [...defaultTasks, ...customTasks];
            const task = allTasks[taskIndex];

            const rect = event.currentTarget.getBoundingClientRect();
            const y = event.clientY - rect.top;
            const startMinute = Math.round(y);

            scheduledTasks.push({
                ...task,
                startMinute,
                id: Date.now()
            });

            saveScheduledTasks();
            renderScheduledTasks();

            document.querySelectorAll('.task-template').forEach(t => t.classList.remove('dragging'));
        }

        function deleteScheduledTask(index) {
            if (confirm('Remove this task from schedule?')) {
                scheduledTasks.splice(index, 1);
                saveScheduledTasks();
                renderScheduledTasks();
            }
        }

        // Timer
        function startTaskTimer(index) {
            currentTaskForTimer = scheduledTasks[index];
            document.getElementById('timerTaskName').textContent = currentTaskForTimer.name;
            timerState.minutes = currentTaskForTimer.duration;
            timerState.seconds = 0;
            updateTimerDisplay();
            document.getElementById('timerModal').classList.add('active');
        }

        function toggleTimer() {
            if (timerState.isRunning) {
                pauseTimer();
            } else {
                startTimer();
            }
        }

        function startTimer() {
            timerState.isRunning = true;
            document.getElementById('timerToggle').textContent = 'Pause';
            
            timerState.interval = setInterval(() => {
                if (timerState.seconds === 0) {
                    if (timerState.minutes === 0) {
                        timerComplete();
                        return;
                    }
                    timerState.minutes--;
                    timerState.seconds = 59;
                } else {
                    timerState.seconds--;
                }
                updateTimerDisplay();
            }, 1000);
        }

        function pauseTimer() {
            timerState.isRunning = false;
            clearInterval(timerState.interval);
            document.getElementById('timerToggle').textContent = 'Resume';
        }

        function timerComplete() {
            pauseTimer();
            alert('🎉 Task complete! Great work!');
            closeTimer();
        }

        function closeTimer() {
            pauseTimer();
            document.getElementById('timerModal').classList.remove('active');
            timerState = { isRunning: false, minutes: 0, seconds: 0, interval: null };
        }

        function updateTimerDisplay() {
            const timeString = `${String(timerState.minutes).padStart(2, '0')}:${String(timerState.seconds).padStart(2, '0')}`;
            document.getElementById('timerTime').textContent = timeString;

            // Update progress ring
            const totalSeconds = currentTaskForTimer.duration * 60;
            const remainingSeconds = timerState.minutes * 60 + timerState.seconds;
            const progress = (remainingSeconds / totalSeconds) * 100;
            
            const circumference = 2 * Math.PI * 42;
            const offset = circumference - (progress / 100) * circumference;
            document.getElementById('timerProgress').style.strokeDasharray = `${circumference}`;
            document.getElementById('timerProgress').style.strokeDashoffset = offset;
        }

        // Custom Task Creation
        function createCustomTask() {
            customTaskData = { icon: '📌', color: '#6366f1', image: null };
            document.getElementById('customTaskName').value = '';
            document.getElementById('customTaskDuration').value = '30';
            document.getElementById('previewImage').style.display = 'none';
            document.getElementById('uploadArea').classList.remove('has-image');
            
            renderIconPicker();
            renderColorPicker();
            document.getElementById('editorModal').classList.add('active');
        }

        function renderIconPicker() {
            const container = document.getElementById('iconPicker');
            container.innerHTML = availableIcons.map(icon => `
                <div class="icon-option ${icon === customTaskData.icon ? 'selected' : ''}" onclick="selectIcon('${icon}')">${icon}</div>
            `).join('');
        }

        function renderColorPicker() {
            const container = document.getElementById('colorPicker');
            container.innerHTML = availableColors.map(color => `
                <div class="color-option ${color === customTaskData.color ? 'selected' : ''}" 
                     style="background: ${color};" 
                     onclick="selectColor('${color}')"></div>
            `).join('');
        }

        function selectIcon(icon) {
            customTaskData.icon = icon;
            customTaskData.image = null;
            renderIconPicker();
        }

        function selectColor(color) {
            customTaskData.color = color;
            renderColorPicker();
        }

        function handleImageUpload(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    customTaskData.image = e.target.result;
                    const preview = document.getElementById('previewImage');
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                    document.getElementById('uploadArea').classList.add('has-image');
                };
                reader.readAsDataURL(file);
            }
        }

        function saveCustomTask(event) {
            event.preventDefault();
            
            const task = {
                name: document.getElementById('customTaskName').value,
                duration: parseInt(document.getElementById('customTaskDuration').value),
                icon: customTaskData.icon,
                color: customTaskData.color,
                image: customTaskData.image
            };

            customTasks.push(task);
            localStorage.setItem('customTasks', JSON.stringify(customTasks));
            
            renderTaskTemplates();
            closeEditor();
        }

        function closeEditor() {
            document.getElementById('editorModal').classList.remove('active');
        }

        // Data management
        function saveScheduledTasks() {
            localStorage.setItem('scheduledTasks', JSON.stringify(scheduledTasks));
        }

        function clearDay() {
            if (confirm('Clear all scheduled tasks for today?')) {
                scheduledTasks = [];
                saveScheduledTasks();
                renderScheduledTasks();
            }
        }

        function exportDay() {
            const data = {
                date: new Date().toISOString().split('T')[0],
                tasks: scheduledTasks
            };
            
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `schedule-${data.date}.json`;
            a.click();
            URL.revokeObjectURL(url);
        }

        function showSettings() {
            alert('Settings panel coming soon! You can customize themes, notification sounds, and more.');
        }
    </script>
</body>
</html>
